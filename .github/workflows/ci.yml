name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend — typecheck, lint, tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rtcars_test
          POSTGRES_USER: rtcars
          POSTGRES_PASSWORD: rtcars
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://rtcars:rtcars@localhost:5432/rtcars_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-32-characters-long
      JWT_REFRESH_SECRET: ci-test-refresh-secret-different
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      NODE_ENV: test
      # Keep the scrape scheduler from launching Playwright/hitting the proxy in CI.
      SCRAPE_COPART_ENABLED: "false"
      SCRAPE_IAA_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: cd backend && pnpm install --frozen-lockfile

      - name: Apply migrations
        run: cd backend && pnpm exec prisma migrate deploy

      - name: TypeScript check
        run: cd backend && pnpm exec tsc --noEmit

      - name: ESLint
        run: cd backend && pnpm exec eslint "src/**/*.ts"

      - name: Unit tests
        run: cd backend && pnpm run test:cov

      - name: E2E tests
        run: cd backend && pnpm run test:e2e

  frontend:
    name: Frontend — typecheck, lint, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: TypeScript check
        run: cd frontend && pnpm exec tsc --noEmit

      - name: ESLint
        run: cd frontend && pnpm exec eslint "src/**/*.{ts,tsx}"

      - name: Build
        run: cd frontend && pnpm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
